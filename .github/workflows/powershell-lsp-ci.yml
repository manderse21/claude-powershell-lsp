name: powershell-lsp CI

# Runs the Pester suite for the powershell-lsp plugin on every push / PR to main.
# Matrix: Windows (pwsh 7 + Windows PowerShell 5.1), Ubuntu (pwsh), and macOS (pwsh).
# The integration tests spawn a real PSES daemon over named pipes and now RUN AND
# PASS on Windows, Linux, and macOS alike (named pipes map to Unix domain sockets on
# .NET) -- the cross-platform daemon path that was once "authored, CI-verified later"
# is CI-verified here now; only genuinely unsupported platforms self-skip. (This repo
# IS the plugin, so CI runs on every push -- no path filter, unlike the mande-tooling
# monorepo it was extracted from.)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  pester:
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: windows-pwsh
            os: windows-latest
            interpreter: pwsh
          - label: windows-powershell
            os: windows-latest
            interpreter: powershell
          - label: ubuntu-pwsh
            os: ubuntu-latest
            interpreter: pwsh
          - label: macos-pwsh
            os: macos-latest
            interpreter: pwsh
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Pester suite
        env:
          # Pin the integration test's data root to a workspace path so the warm
          # daemon's own logs (pses-daemon.log, pses-server-*.log, pses-stderr-*.log)
          # are uploadable as a diagnostic artifact below -- without this the hosted
          # CI harness never surfaces them, which is exactly what blocked debugging
          # the ubuntu-pwsh bring-up failure.
          PSLS_TEST_DATA_DIR: ${{ github.workspace }}/psls-test-data
        run: ${{ matrix.interpreter }} -NoProfile -ExecutionPolicy Bypass -File ./tests/run-tests.ps1 -CI

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pester-results-${{ matrix.label }}
          path: tests/testResults.xml
          if-no-files-found: ignore

      - name: Upload daemon logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daemon-logs-${{ matrix.label }}
          path: |
            psls-test-data/logs/**
            psls-test-data/session/**
          if-no-files-found: ignore

      # The performance benchmark harness (dispatch 000040) emits its measured
      # cold-start / warm-path numbers here; surface them as a first-class artifact
      # so per-leg latency is downloadable for characterizing and later tightening
      # the (deliberately generous) regression thresholds.
      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results-${{ matrix.label }}
          path: psls-test-data/logs/benchmark-results.json
          if-no-files-found: ignore
